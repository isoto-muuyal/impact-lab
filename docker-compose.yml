services:
  impactlab:
    image: ${IMAGE_URI:-impactlab:local}
    container_name: ${CONTAINER_NAME:-impactlab}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      - impactlab-network

networks:
  impactlab-network:
    external: true
    name: ${DOCKER_NETWORK:-shared_network}
    # Add to your existing docker-compose

tempo:
  image: grafana/tempo:latest
  container_name: tempo
  command: ["-config.file=/etc/tempo.yaml"]
  volumes:
    - ./tempo.yaml:/etc/tempo.yaml
  ports:
    - "4318:4318"   # OTLP HTTP (where your app sends traces)
    - "3200:3200"   # Tempo query API (Grafana reads from here)
  networks:
    - shared_network

