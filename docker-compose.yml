services:
  impact-lab:
    image: ${IMAGE_URI:-impact-lab:local}
    container_name: impact-lab
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-5000}:5000"
    networks:
      - impactlab-network

networks:
  impactlab-network:
    external: true
    name: ${DOCKER_NETWORK:-impactlab-network}
