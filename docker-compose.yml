services:
  impactlab:
    image: ${IMAGE_URI:-impactlab:local}
    container_name: ${CONTAINER_NAME:-impactlab}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      - impactlab-network

networks:
  impactlab-network:
    external: true
    name: ${DOCKER_NETWORK:-shared_network}
